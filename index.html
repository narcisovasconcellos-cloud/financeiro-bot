<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3d2b">
  <title>💰 Financeiro Família</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="lock-overlay" id="lock-overlay">
  <div class="lock-card">
    <div class="lock-emoji">🔒</div>
    <div class="lock-title">Financeiro Família</div>
    <div class="lock-subtitle">Digite a senha para acessar</div>
    <input type="password" id="lock-input" placeholder="Senha" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') desbloquear()">
    <button class="lock-btn" id="lock-btn" onclick="desbloquear()">Entrar</button>
    <div class="lock-erro" id="lock-erro"></div>
  </div>
</div>

<div class="header">
  <div class="header-title">💰 Financeiro<br>Família</div>
  <div class="header-subtitle" id="header-sub">Narciso &amp; Bruna · Registrar lançamento</div>
</div>

<!-- ===================== VIEW: REGISTRAR ===================== -->
<div id="view-registrar" class="view">

  <div class="edit-banner" id="edit-banner">
    <span>✏️ Editando lançamento</span>
    <button onclick="cancelarEdicao()">cancelar</button>
  </div>

  <div class="tipo-tabs">
    <button class="tipo-tab despesa active" onclick="setTipo('Despesa')">💸 Despesa</button>
    <button class="tipo-tab receita" onclick="setTipo('Receita')">💰 Receita</button>
  </div>

  <div class="form-container">
    <div class="field-group">
      <label>Quem está registrando?</label>
      <div class="chips">
        <div class="chip active" data-quem="Narciso" onclick="setQuem('Narciso')">👨 Narciso</div>
        <div class="chip" data-quem="Bruna" onclick="setQuem('Bruna')">👩 Bruna</div>
      </div>
    </div>

    <div class="field-group">
      <label>Valor</label>
      <div class="valor-wrap">
        <span class="valor-prefix">R$</span>
        <input type="number" id="valor" placeholder="0,00" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>

    <div class="field-group">
      <label>Categoria</label>
      <div class="select-wrap">
        <select id="categoria"><option value="">Selecione...</option></select>
      </div>
    </div>

    <div class="field-group">
      <label>Descrição</label>
      <input type="text" id="descricao" placeholder="Ex: Supermercado, Salário, Netflix...">
    </div>

    <div class="divider"></div>
    <div class="divider-label">Opções adicionais</div>

    <div class="field-group">
      <div class="toggle-row" onclick="toggleFixa()">
        <span class="toggle-label">📌 Conta fixa mensal</span>
        <div class="toggle-switch" id="toggle-fixa"></div>
      </div>
    </div>

    <div class="field-group">
      <div class="toggle-row" onclick="toggleParcelado()">
        <span class="toggle-label">💳 Compra parcelada</span>
        <div class="toggle-switch" id="toggle-parc"></div>
      </div>
      <div class="parcelas-row" id="parcelas-row">
        <div class="field-group" style="margin:0">
          <label style="margin-top:8px">Parcela atual</label>
          <input type="number" id="parcela-atual" placeholder="Ex: 3" min="1">
        </div>
        <div class="field-group" style="margin:0">
          <label style="margin-top:8px">Total de parcelas</label>
          <input type="number" id="parcela-total" placeholder="Ex: 12" min="1">
        </div>
      </div>
    </div>

    <div class="field-group">
      <label>Data</label>
      <input type="date" id="data">
      <div class="data-hoje" id="data-hoje"></div>
    </div>

    <div class="field-group">
      <label>Observação (opcional)</label>
      <textarea id="observacao" rows="2" placeholder="Algum detalhe adicional..." style="resize:none"></textarea>
    </div>
  </div>

  <button class="btn-submit" id="btn-submit" onclick="enviar()">
    <span id="btn-icon">💸</span> <span id="btn-text">Registrar Despesa</span>
  </button>
</div>

<!-- ===================== VIEW: EXTRATO ===================== -->
<div id="view-extrato" class="view" style="display:none">
  <div class="extrato-container">
    <div class="month-nav">
      <button onclick="mudarMes(-1)" aria-label="Mês anterior">◀</button>
      <span id="month-label">—</span>
      <button onclick="mudarMes(1)" aria-label="Próximo mês">▶</button>
    </div>

    <div class="saldo-card">
      <div class="saldo-item"><span>Receitas</span><strong id="s-receitas" class="pos">R$ 0,00</strong></div>
      <div class="saldo-item"><span>Despesas</span><strong id="s-despesas" class="neg">R$ 0,00</strong></div>
      <div class="saldo-item saldo-total"><span>Saldo</span><strong id="s-saldo">R$ 0,00</strong></div>
    </div>

    <div id="extrato-lista" class="extrato-lista"></div>
  </div>
</div>

<!-- ===================== NAVEGAÇÃO INFERIOR ===================== -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-registrar" onclick="mostrarView('registrar')">
    <span class="nav-ico">📝</span><span>Registrar</span>
  </button>
  <button class="nav-item" id="nav-extrato" onclick="mostrarView('extrato')">
    <span class="nav-ico">📊</span><span>Extrato</span>
  </button>
</nav>

<script src="js/app.js"></script>
</body>
</html>
